<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!--
    OG card source (1200x630) — rasterized once to public/og.png with:
      convert -density 96 assets/og.svg site/public/og.png
    Dark bg + wats_ wordmark + landing headline, per T11.
  -->
  <rect width="1200" height="630" fill="#0A0E12"/>
  <rect x="0" y="622" width="1200" height="8" fill="#25D366"/>
  <text x="96" y="240" font-family="DejaVu Sans Mono" font-size="120" font-weight="bold" fill="#E7EDF3">wats</text>
  <text x="384" y="240" font-family="DejaVu Sans Mono" font-size="120" font-weight="bold" fill="#25D366">_</text>
  <text x="96" y="360" font-family="DejaVu Sans" font-size="48" fill="#E7EDF3">The WhatsApp Cloud API,</text>
  <text x="96" y="424" font-family="DejaVu Sans" font-size="48" fill="#E7EDF3">typed end to end.</text>
  <text x="96" y="520" font-family="DejaVu Sans Mono" font-size="30" fill="#8B98A5">wats.sh — TypeScript toolkit for bots, webhooks, and the Graph API</text>
