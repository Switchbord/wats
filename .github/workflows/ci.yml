name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Bun tests and release hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package artifacts for workspace import tests
        run: bun run build:packages

      - name: Run tests
        run: bun test

      - name: Run minimal bot example smoke
        run: bun run examples:minimal-bot

      - name: Run webhook echo bot example smoke
        run: bun run examples:webhook-echo-bot

      - name: Typecheck publishable packages
        run: bun run typecheck

      - name: Typecheck full source tree (all packages, Bun runtime types)
        run: bun run typecheck:full

      - name: Check publishability guard
        run: bun run check-publish

      - name: Playground asset freshness gate
        run: |
          cd site/playground-build
          bun install --frozen-lockfile
          bun run bundle.ts
          cd ../..
          (cd site && bun scripts/gen-playground-assets.ts)
          git diff --exit-code -- site/public/playground/
