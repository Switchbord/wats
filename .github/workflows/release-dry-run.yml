name: Release dry-run

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: none

jobs:
  release-dry-run:
    name: Credential-free release dry-run
    runs-on: ubuntu-latest
    env:
      WATS_RELEASE_DRY_RUN: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release dry-run
        run: bun run release:dry-run
