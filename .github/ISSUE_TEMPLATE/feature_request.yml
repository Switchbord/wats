name: Feature request
description: Propose a new capability, surface, or behavior change for WATS.
title: "feat: <one-line summary>"
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use Discussions for open-ended ideas. Open a feature request when you have a concrete proposal with a desired API or behavior in mind.
        Substantial behavior changes typically also need a Linear issue and may require an ADR; a maintainer will guide you.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user-facing problem or limitation are you trying to solve? Avoid jumping to a specific implementation here.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Sketch the desired API, command, behavior, or doc. Concrete code or CLI invocations are very welcome.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other shapes you weighed, and why this one wins.
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Which surface would this touch?
      multiple: true
      options:
        - "@switchbord/client (high-level)"
        - "@switchbord/graph (Graph endpoints)"
        - "@switchbord/webhook (signature / dispatcher)"
        - "@switchbord/service (Bun.serve runtime)"
        - "@switchbord/cli (init / setup / serve / doctor / openapi / config validate)"
        - "@switchbord/types"
        - "Docs / examples"
        - "Cross-package / unsure"
    validations:
      required: true
  - type: dropdown
    id: parity
    attributes:
      label: pywa parity relevance
      options:
        - "Direct pywa parity (already exists in pywa)"
        - "Extension beyond pywa"
        - "Not applicable"
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Pre-submission checks
      options:
        - label: I have searched existing issues, discussions, and the parity matrix.
          required: true
        - label: I understand this proposal is non-binding and may be deferred or declined.
          required: true
